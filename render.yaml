# Render Blueprint (Initial_plan.md §12): one free-tier web service built from
# the Dockerfile. Create via dashboard -> New -> Blueprint -> this repo; Render
# prompts for the two sync:false secrets and never stores them in git. The
# free tier sleeps after ~15 min idle (first visit then takes ~50 s) and runs
# a single instance — which the in-memory rate limit requires (§14).
services:
  - type: web
    name: thesis-companion
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # The dedicated, spend-capped key (§4.2) — entered in the dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
      # The shared examiner password — entered in the dashboard.
      - key: SITE_PASSWORD
        sync: false
      # Haiku 4.5 ($1/$5 per 1M, cache reads $0.10/1M) instead of Opus 4.7 for
      # cost. effort=none is REQUIRED with Haiku (no adaptive-thinking support);
      # the two caps below bound one question at ~$0.50 worst case (~$0.05-0.15
      # realistic warm-cache). To go back to Opus: model=claude-opus-4-7,
      # effort=high, and the caps can be relaxed (but redo the cost math —
      # Opus tokens are 5x the price and its context is 1M, not 200k).
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5
      - key: ANTHROPIC_EFFORT
        value: none
      - key: MAX_TOOL_CALLS_PER_TURN
        value: "6"
      - key: MAX_OUTPUT_TOKENS
        value: "2500"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
